name: Node.js CI
on:
  push:
    branches:
      - master
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'
      - name: Install dependencies and run tests
        run: npm install
      - name: Run tests
        run: npm test
      - name: Build project
        run: npm run build
