name: Node.js CI
on:
  push:
    branches:
      - master
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'
      - name: Install dependencies and run tests
        run: npm install
      - name: Run tests
        run: npm test
      - name: Build project
        run: npm run build
      - name: Upload build artifacts # Upload the contents of the dist directory as build artifacts 
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts
          path: /home/runner/work/GithubActions-NodeJs-Demo/GithubActions-NodeJs-Demo/dist/index.html
